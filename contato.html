<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato — Skills Jurídicas com IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#ccc;font-size:16px;line-height:1.8}
        .container{max-width:600px;margin:0 auto;padding:40px 20px 80px}
        a{color:#00ff88;text-decoration:none}
        a:hover{text-decoration:underline}
        h1{font-family:'JetBrains Mono',monospace;font-size:28px;color:#00ff88;margin-bottom:24px}
        .back{display:inline-block;margin-bottom:32px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#666}
        .back:hover{color:#00ff88}
        .contact-card{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:32px;margin-bottom:24px}
        .contact-item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #1a1a1a}
        .contact-item:last-child{border-bottom:none}
        .contact-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0}
        .contact-label{font-size:12px;color:#555;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px}
        .contact-value{font-size:16px;color:#e8e8e8;font-weight:500}
        .contact-value a{color:#00ff88}
        .hours{margin-top:8px;padding:20px 24px;background:rgba(0,255,136,0.04);border:1px solid rgba(0,255,136,0.1);border-radius:12px}
        .hours p{color:#999;font-size:14px;margin-bottom:4px}
        .hours strong{color:#e8e8e8}
        .form-section{margin-top:40px}
        .form-section h2{font-family:'JetBrains Mono',monospace;font-size:20px;color:#e8e8e8;margin-bottom:20px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;color:#666;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
        .form-group input,.form-group textarea{width:100%;padding:14px 16px;background:#111;border:1px solid #1e1e1e;border-radius:10px;color:#e8e8e8;font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
        .form-group input:focus,.form-group textarea:focus{border-color:#00ff88}
        .form-group textarea{min-height:120px;resize:vertical}
        .form-btn{display:block;width:100%;padding:16px;background:#00ff88;color:#0a0a0a;border:none;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
        .form-btn:hover{background:#00e676;box-shadow:0 0 20px rgba(0,255,136,0.3)}
        footer{text-align:center;padding:24px;font-size:12px;color:#444;border-top:1px solid #1e1e1e;margin-top:60px}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back">← Voltar</a>
    <h1>Contato</h1>

    <div class="contact-card">
        <div class="contact-item">
            <div class="contact-icon">📧</div>
            <div>
                <div class="contact-label">Email</div>
                <div class="contact-value"><a href="mailto:leonardo@rsabr.adv.br">leonardo@rsabr.adv.br</a></div>
            </div>
        </div>
        <div class="contact-item">
            <div class="contact-icon">📞</div>
            <div>
                <div class="contact-label">Telefone</div>
                <div class="contact-value"><a href="tel:+554730421465">(47) 3042-1465</a></div>
            </div>
        </div>
        <div class="contact-item">
            <div class="contact-icon">🏢</div>
            <div>
                <div class="contact-label">Escritório</div>
                <div class="contact-value">RSA Advocacia — Blumenau/SC</div>
            </div>
        </div>
    </div>

    <div class="hours">
        <p><strong>Horário de atendimento</strong></p>
        <p>Segunda a Sexta, 9h às 18h</p>
        <p style="margin-top:8px;font-size:13px;color:#666">Respondemos em até 24 horas úteis.</p>
    </div>

    <div class="form-section">
        <h2>Envie uma mensagem</h2>
        <form action="mailto:leonardo@rsabr.adv.br" method="post" enctype="text/plain">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome" placeholder="Seu nome completo" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Mensagem</label>
                <textarea name="mensagem" placeholder="Como podemos ajudar?" required></textarea>
            </div>
            <button type="submit" class="form-btn">Enviar mensagem →</button>
        </form>
    </div>

    <footer>
        <p>Skills Jurídicas com IA — RSA Advocacia &middot; <a href="index.html">Voltar à página principal</a></p>
    </footer>
</div>
</body>
</html>
